<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitChat</title>
<style>
body { background:#111; color:#eee; font-family:sans-serif; }
input, button { margin:4px; padding:6px; }
#chat { border:1px solid #444; height:200px; overflow:auto; padding:5px; }
#users { border:1px solid #444; padding:5px; margin-top:5px; }
.hidden { display:none; }
#debug { position:fixed; bottom:0; left:0; background:#000; color:#0f0; font-size:11px; padding:6px; max-height:35%; overflow:auto; width:100%; }
.user { display:flex; justify-content:space-between; margin:2px 0; }
#pingDisplay { position:fixed; top:0; right:0; background:#222; color:#0f0; padding:4px; font-size:12px; }
</style>
</head>
<body>

<h2>GitChat</h2>

<div id="setup">
  <input id="username" placeholder="Username">
  <input id="room" placeholder="Room name">
  <label><input type="checkbox" id="privateChk"> Private</label>
  <input id="password" placeholder="Password (3+)">
  <br>
  <button onclick="hostRoom()">Host</button>
</div>

<h3>Rooms</h3>
<div id="rooms"></div>

<hr>

<div id="status"></div>
<button id="leaveBtn" class="hidden" onclick="leaveRoom()">Leave</button>

<div id="chatBox" class="hidden">
  <div id="users"></div>
  <div id="chat"></div>
  <input id="msg" placeholder="Message">
  <button onclick="sendMsg()">Send</button>
</div>

<div id="debug"></div>
<div id="pingDisplay">Ping: --ms</div>

<script src="app.js"></script>
</body>
</html>
