<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Profile overlay -->
<div id="profileOverlay">
  <h2>Create Your Profile</h2>
  <input type="text" id="usernameInput" placeholder="Username">
  <input type="text" id="avatarInput" placeholder="Avatar URL (optional)">
  <button id="startChat">Start Chat</button>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <h2>Servers</h2>
  <ul id="roomList"></ul>
  <input type="text" id="newRoomName" placeholder="New Room Name">
  <button id="createRoom">Create Room</button>

  <h3>Members</h3>
  <div id="memberList"></div>

  <button id="clearChatBtn" style="display:none;">Clear Chat Logs</button>
  <button id="disbandBtn" style="display:none;">Disband Server</button>
</div>

<!-- Chat container -->
<div id="chatContainer">
  <h2 id="roomTitle">Select a server</h2>
  <div id="messages"></div>

  <input type="file" id="fileInput">
  <input type="text" id="messageInput" placeholder="Type a message...">
  <button id="sendMsg">Send</button>
</div>

<script type="module" src="scripts/firebase.js"></script>
<script type="module" src="scripts/rooms.js"></script>
<script type="module" src="scripts/chat.js"></script>
</body>
</html>
