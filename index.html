<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitChat</title>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- Favicons -->
<link rel="icon" type="image/jpeg" sizes="16x16"
href="https://raw.githubusercontent.com/AC1DST4R/GitChatV1/main/Photos/favicon%2016x16.jpg">

<link rel="icon" type="image/jpeg" sizes="32x32"
href="https://raw.githubusercontent.com/AC1DST4R/GitChatV1/main/Photos/favicon%2032x32.jpg">

<link rel="icon" type="image/jpeg" sizes="48x48"
href="https://raw.githubusercontent.com/AC1DST4R/GitChatV1/main/Photos/favicon%2048x48.jpg">

<link rel="apple-touch-icon" sizes="150x150"
href="https://raw.githubusercontent.com/AC1DST4R/GitChatV1/main/Photos/touchicon%20150x150.jpg">

<!-- Social Preview -->
<meta property="og:title" content="GitChat">
<meta property="og:description" content="Real-time chat rooms coded by AC1DST4R">
<meta property="og:image"
content="https://raw.githubusercontent.com/AC1DST4R/GitChatV1/refs/heads/main/Photos/preview.png">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">

</head>


<body>

<div class="card">

<h1>🔥 GitChat</h1>

<div id="roomSelection">

<input type="text" id="username" placeholder="Enter Username">
<input type="text" id="roomInput" placeholder="Enter Room Name">

<button onclick="joinRoom()">Join / Create Room</button>

</div>


<div id="chatContainer">

<h3 id="roomTitle"></h3>

<div id="messages"></div>

<div class="inputRow">

<input
type="text"
id="messageInput"
placeholder="Type message..."
onkeydown="if(event.key==='Enter') sendMessage()"
>

<button onclick="sendMessage()">Send</button>

</div>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";


const firebaseConfig = {
apiKey: "AIzaSyCXi-M0wMZT165T9FHCK8Dw-WJK_I1MuDg",
authDomain: "gitchat-backend.firebaseapp.com",
projectId: "gitchat-backend",
storageBucket: "gitchat-backend.firebasestorage.app",
messagingSenderId: "385257284178",
appId: "1:385257284178:web:20d7ce32ba1b1ed554f58b"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

await signInAnonymously(auth);


let currentRoom = "";
let username = "";
let displayName = "";
let unsubscribe = null;


const specialUsers = {

"AC1DST4R": { title: "Founder", key: "17380324" },
"mik": { title: "Administrator", key: "612839" },
"s1lv3rsKKy": { title: "Administrator", key: "718233" }

};


function decodeKey(key){
return key;
}


window.joinRoom = function(){

username = document.getElementById("username").value.trim();
currentRoom = document.getElementById("roomInput").value.trim();

if(!username || !currentRoom){

alert("Enter username and room name!");
return;

}


if(specialUsers[username]){

const keyInput = prompt(`✨ Your Username is a ${specialUsers[username].title} ✨\nEnter your key:`);

if(keyInput !== decodeKey(specialUsers[username].key)){

alert("Invalid key!");
return;

}

}


document.getElementById("roomSelection").style.display="none";
document.getElementById("chatContainer").style.display="flex";


displayName = username;

if(specialUsers[username])
displayName += ` (${specialUsers[username].title})`;


document.getElementById("roomTitle").innerText = "Room: " + currentRoom;

loadMessages();

}



function loadMessages(){

if(unsubscribe) unsubscribe();

const messagesRef = collection(db,"rooms",currentRoom,"messages");

const q = query(messagesRef,orderBy("timestamp"));


unsubscribe = onSnapshot(q,snapshot=>{

const messagesDiv = document.getElementById("messages");

messagesDiv.innerHTML = "";


snapshot.forEach(doc=>{

const msg = doc.data();

const msgDiv = document.createElement("div");

msgDiv.classList.add("message");

msgDiv.classList.add(msg.uid===auth.currentUser.uid?"self":"other");


const usernameDiv = document.createElement("div");

usernameDiv.classList.add("username");


const nameParts = msg.username.match(/(.+?)\s?\((.+)\)?$/);

if(nameParts){

const nameSpan = document.createElement("span");
nameSpan.textContent = nameParts[1];

const titleSpan = document.createElement("span");
titleSpan.textContent = `(${nameParts[2]})`;
titleSpan.classList.add("title",nameParts[2]);

usernameDiv.appendChild(nameSpan);
usernameDiv.appendChild(titleSpan);

}
else{

usernameDiv.textContent = msg.username;

}


const bubbleDiv = document.createElement("div");

bubbleDiv.classList.add("bubble");

bubbleDiv.textContent = msg.text;


msgDiv.appendChild(usernameDiv);

msgDiv.appendChild(bubbleDiv);

messagesDiv.appendChild(msgDiv);

});


messagesDiv.scrollTop = messagesDiv.scrollHeight;

});

}



window.sendMessage = async function(){

const input = document.getElementById("messageInput");

const text = input.value.trim();

if(!text) return;


const messagesRef = collection(db,"rooms",currentRoom,"messages");


await addDoc(messagesRef,{

uid: auth.currentUser.uid,
username: displayName,
text: text,
timestamp: Date.now()

});


input.value = "";

};

</script>

</body>
</html>
